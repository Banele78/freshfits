spring.mail.password=vpge wjer uqbh wcqh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# where to store images (server filesystem path or mounted volume)
app.upload.image-dir=uploads/images
# how they are served publicly (e.g., via static resource handler mapping)
app.upload.public-base=/images
# max image upload size in bytes (default 5MB)
app.upload.max-image-bytes=5242880


app.frontend.url=https://freshfitssa.netlify.app
#Password reset settings
security.password-reset.expiration-hours=1
security.password-reset.max-attempts=10
security.password-reset.attempt-ttl=24 
# Password policy settings
app.security.password.min-length=8
app.security.password.common=password,123456,123456789,qwerty,letmein,welcome,admin
# Registration settings
app.registration.rate-limit.ip=15
app.registration.rate-limit.email=10
app.registration.activate-immediately=false
app.registration.verification-timeout-hours=24
app.registration.auto-cleanup-days=7
app.registration.allow-reregister=true
#Login settings
app.login.rate-limit.ip=50
app.login.rate-limit.email=15
app.login.max-attempts=10
app.login.lockout-minutes=20
app.login.allow-password-check=true
app.security.alert.enabled=true

# Google OAuth2 Configuration with fallback values
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:default-client-id-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:default-client-secret-placeholder}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=https://freshfits-api-295348213800.europe-west1.run.app/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_basic

# Google OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# ===============================
# Flyway Configuration
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# (Optional but recommended)
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
