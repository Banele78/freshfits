spring.application.name=ecommerce
spring.main.lazy-initialization=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET}
jwt.issuer=ecommerce-api
jwt.audience=frontend
jwt.accessExpirationMs=1800000

jwt.refreshExpirationMs=604800000
jwt.clockSkewSec=30

# ===== Security =====
spring.security.oauth2.resourceserver.jwt.secret-value=${JWT_SECRET}

# ===== Actuator =====
management.endpoints.web.exposure.include=health,metrics,info
//management.endpoint.health.show-details=when_authorized
management.endpoint.metrics.enabled=true
management.endpoint.info.enabled=true

# ===== Logging =====
logging.level.com.greenpublic.ecommerce=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===== Rate Limiting =====
rate.limit.login.attempts=10
rate.limit.login.duration=1m
rate.limit.refresh.attempts=20
rate.limit.refresh.duration=1m
rate.limit.register.attempts=5
rate.limit.register.duration=1h

# ===== Cache =====
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100000,expireAfterWrite=30d

# ===== Async Processing =====
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# ===== Compression =====
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

yoco.api.secret-key=${YOCO_API_SECRET_KEY}
yoco.api.public-key=${YOCO_API_PUBLIC_KEY}

# Your backend webhook endpoint
yoco.webhook.url=https://freshfits-api-295348213800.europe-west1.run.app/api/webhook/yoco

# Webhook verification secret (from Yoco after registration)


cart.low-stock-threshold=5

reservation.expiryMinutes=10

# Cleanup cadence
orders.cleanup.enabled=true
orders.cleanup.fixedDelay=60000
orders.cleanup.initialDelay=15000
orders.cleanup.pageSize=500


spring.mail.host=smtp.gmail.com
spring.mail.port=587
